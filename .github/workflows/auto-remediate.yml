---
name: "Security - Auto-Remediation PR"

on:
  workflow_dispatch:
    inputs:
      source-pr:
        description: 'Source PR number'
        required: true
        type: string
      vulnerability-report:
        description: 'Vulnerability report JSON'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-remediate:
    name: "Auto-Fix Vulnerabilities"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Vulnerability Report
        id: parse-report
        env:
          VULNREPORT: ${{ inputs.vulnerability-report }}
        run: |
          echo "Parsing vulnerability report..."
          echo "$VULNREPORT" > /tmp/report.json
          CRITICAL=$(jq '.resumen.criticos' /tmp/report.json)
          HIGH=$(jq '.resumen.altos' /tmp/report.json)
          TOTAL=$(jq '.vulnerabilidades | length' /tmp/report.json)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          cat /tmp/report.json > report.json

      - name: Prepare Fix Branch
        id: prep-branch
        run: |
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="security/auto-fix-${TIMESTAMP}"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          git config user.email "$EMAIL"
          git checkout -b "$BRANCH_NAME"

      - name: Apply Fixes from Report
        run: |
          jq -r '.vulnerabilidades[] |
            select(.codigo_corregido and .codigo_corregido != "N/A") |
            "\(.archivo):\(.linea):\(.codigo_corregido)"' report.json \
            > /tmp/fixes.txt
          echo "=== Fixes to apply ==="
          cat /tmp/fixes.txt || echo "No automated fixes available"
          mkdir -p .security
          cp report.json .security/vulnerabilities-fixed.json
          git add .security/vulnerabilities-fixed.json
          if ! git diff --cached --quiet; then
            MSG="fix(security): Auto-remediation of vulnerabilities"
            MSG="$MSG"$'\n''Applied fixes using OpenAI GPT-4o analysis'
            MSG="$MSG"$'\n''See .security/vulnerabilities-fixed.json'
            git commit -m "$MSG"
          fi

      - name: Push Branch and Create PR
        id: create-pr
        uses: actions/github-script@v7
        env:
          REPORT_FILE: report.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const REPORT = JSON.parse(
              fs.readFileSync(process.env.REPORT_FILE, 'utf8')
            );
            const BRANCH = '${{ steps.prep-branch.outputs.branch }}';
            try {
              execSync('git push origin ' + BRANCH, { stdio: 'inherit' });
            } catch (e) {
              console.log('Branch push failed or already exists');
            }
            const totalVulns = REPORT.vulnerabilidades.length;
            const criticos = REPORT.resumen.criticos;
            const altos = REPORT.resumen.altos;
            const title = '🔐 Security Auto-Fix: ' + totalVulns +
              ' vulnerabilities';
            const vulnList = REPORT.vulnerabilidades
              .map(v => '- ' + v.titulo + ' (' + v.severidad + ') in ' +
                v.archivo + ':' + v.linea)
              .join('\n');
            const body = '## 🤖 OpenAI GPT-4o Security Fixes\n\n' +
              'Automatic remediation PR.\n\n' +
              '### Summary\n\n' +
              '- Total Vulnerabilities: ' + totalVulns + '\n' +
              '- Critical: ' + criticos + '\n' +
              '- High: ' + altos + '\n\n' +
              '### Vulnerabilities Addressed\n\n' +
              vulnList + '\n\n' +
              '### Important Notes\n\n' +
              '1. Review required before merging\n' +
              '2. Run tests after applying fixes\n' +
              '3. Validate critical issues manually\n\n' +
              '---\n\n' +
              'Source PR: #${{ inputs.source-pr }}';
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              head: BRANCH,
              base: context.payload.repository.default_branch,
              draft: criticos > 0
            });
            console.log('PR created: #' + pr.data.number);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['security', 'auto-fix', 'ai-remediation']
            });
            core.setOutput('pr-number', pr.data.number);

      - name: Comment on Source PR
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_FILE: report.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync(process.env.REPORT_FILE)) {
              console.log('Report file not found');
              return;
            }
            const REPORT = JSON.parse(
              fs.readFileSync(process.env.REPORT_FILE, 'utf8')
            );
            const prNumber = '${{ steps.create-pr.outputs.pr-number }}';
            const sourcePrNumber = '${{ inputs.source-pr }}';
            if (!prNumber || prNumber === 'undefined') {
              console.log('No PR was created');
              return;
            }
            const comment = '## 🔐 Auto-Remediation Available\n\n' +
              'OpenAI GPT-4o identified ' +
              REPORT.vulnerabilidades.length + ' vulnerabilities ' +
              'and created [#' + prNumber +
              '](../../pull/' + prNumber +
              ') with suggested fixes.\n\n' +
              'Review and merge when satisfied.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(sourcePrNumber),
              body: comment
            });

      - name: Summary
        if: always()
        run: |
          echo "✅ Auto-remediation workflow completed"
