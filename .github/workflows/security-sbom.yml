name: "Security - SBOM"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
    # IMPORTANTE: Declaramos que este workflow necesita el secreto
    secrets:
      DTRACK_API_KEY:
        required: true

jobs:
  sbom-generation:
    name: "3.5 Inventario SBOM"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Generar SBOM
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -Dcyclonedx.skipAttach=true

      - name: Enviar a Dependency-Track (Automatización)
        run: |
          DTRACK_URL="https://prepositional-undistantly-jestine.ngrok-free.dev/api/v1/bom"
          
          curl -X "POST" "$DTRACK_URL" \
               -H "Content-Type: multipart/form-data" \
               -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
               -H "ngrok-skip-browser-warning: true" \
               -F "projectName=${{ github.event.repository.name }}" \
               -F "projectVersion=main" \
               -F "autoCreate=true" \
               -F "bom=@target/bom.json"

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-sbom
          path: target/bom.json