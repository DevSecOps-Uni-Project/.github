name: "Security - SCA Snyk"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
    secrets:
      SNYK_TOKEN:
        required: false

jobs:
  dependency-scan:
    name: "3. SCA (Snyk)"
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Prepare Results Directory
        run: |
          mkdir -p security-results
          echo "Workspace: $(pwd)"

      - name: Validar SNYK_TOKEN
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "❌ SNYK_TOKEN no configurado. No se puede ejecutar SCA."
            exit 1
          fi

          echo "✅ SNYK_TOKEN detectado"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Run Snyk
        run: |
          npm install -g snyk@1.1297.0
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          snyk test \
            --file=pom.xml \
            --json-file-output=security-results/snyk-results.json \
            --sarif-file-output=security-results/snyk.sarif \
            || true

          if [ ! -s security-results/snyk-results.json ]; then
            echo "⚠️ Snyk no generó resultados. Se crea fallback."
            echo '{"vulnerabilities": []}' > security-results/snyk-results.json
          fi

          echo "=== Snyk JSON Preview ==="
          head -n 40 security-results/snyk-results.json || true

      - name: Debug Snyk Output
        if: always()
        run: |
          pwd
          ls -la
          ls -la security-results || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/snyk.sarif

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: security-snyk
          path: security-results/snyk-results.json
          if-no-files-found: warn
