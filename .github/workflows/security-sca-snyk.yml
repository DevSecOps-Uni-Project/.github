name: "Security - SCA Snyk"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
    secrets:
      SNYK_TOKEN:
        required: false

jobs:
  dependency-scan:
    name: "3. SCA (Snyk)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Validar SNYK_TOKEN
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "SNYK_TOKEN no esta configurado o llego vacio en el caller."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Run Snyk
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          # Generamos JSON para tu script de IA (triage)
          snyk test --file=pom.xml --json > snyk-results.json || true
          # Generamos SARIF para la pestaña de Seguridad de GitHub
          snyk test --file=pom.xml --sarif-file-output=snyk.sarif || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
