name: "Security - Secrets Audit"

on:
  workflow_call:

jobs:
  secrets-audit:
    name: "1. Secrets Guardian"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Results Directory
        run: |
          mkdir -p security-results
          echo "Workspace: $(pwd)"

      - name: Scan Secrets (TruffleHog)
        run: |
          # Escaneo local del repositorio git para evitar rate limiting de la API de GitHub
          # y mantener visibilidad sobre el historial completo del repo (fetch-depth: 0).
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/pwd" \
            -w /pwd \
            trufflesecurity/trufflehog:latest \
            git file:///pwd --json \
            > security-results/trufflehog-results.json

          COUNT=$(grep -c '"DetectorName"' security-results/trufflehog-results.json || true)
          echo "Secret findings detectados: $COUNT"

          cat security-results/trufflehog-results.json || true

          if [ "$COUNT" -ge 2 ]; then
            echo "❌ Múltiples secretos detectados ($COUNT)"
            echo "⚠️ Secretos detectados pero no se bloquea (modo diagnóstico)"
            #exit 1
          fi

      - name: Debug TruffleHog Output
        if: always()
        run: |
          pwd
          ls -la
          ls -la security-results || true

      - name: Save Secrets Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-trufflehog
          path: security-results/trufflehog-results.json
          if-no-files-found: warn
          retention-days: 1
