name: "Security - SAST CodeQL"

on:
  workflow_call:

jobs:
  analyze:
    name: Analyze Java/Kotlin
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: java-kotlin
        build-mode: manual
        queries: security-extended

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build project
      run: mvn clean install -DskipTests

    - name: Prepare Results Directory
      run: mkdir -p security-results
  
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:java-kotlin"
        output: security-results/codeql-results.sarif
        upload: true

    - name: Upload CodeQL Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: codeql-report
        path: security-results/codeql-results.sarif
        if-no-files-found: warn
    
    - name: Conteo de hallazgos CodeQL
      if: always()
      run: |
        FILE="security-results/codeql-results.sarif"

        if [ -z "$FILE" ]; then
          echo "❌ No se encontró archivo SARIF"
          exit 0
        fi

        TOTAL=$(jq '[.runs[].results[]?] | length' "$FILE")

        echo "=== CodeQL Findings ==="
        echo "Total: $TOTAL"