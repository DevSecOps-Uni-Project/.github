name: "Security - SAST CodeQL"

on:
  workflow_call:

jobs:
  analyze:
    name: Analyze Java/Kotlin
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'java-kotlin'
        build-mode: 'none' 

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:java-kotlin"
        upload: true 


    - name: Export CodeQL Results for IA
      run: |
        # Buscamos el archivo sarif generado por CodeQL
        cp ../results/java-kotlin.sarif ./codeql-results.sarif || echo "No se encontró SARIF"

    - name: Upload CodeQL Artifact
      uses: actions/upload-artifact@v4
      with:
        name: codeql-report
        path: codeql-results.sarif