name: "Security - SAST CodeQL"

on:
  workflow_call:

jobs:
  analyze:
    name: "3. SAST CodeQL"
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-extended

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build project
        run: mvn clean install -DskipTests

      # 1. Preparar directorio igual que en Semgrep/Snyk
      - name: Prepare Results Directory
        run: mkdir -p security-results

      # 2. Ejecución con salida forzada a tu carpeta central
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
          upload: true
          output: security-results # Forzamos que los SARIF caigan aquí

      # 3. Normalización del nombre para la IA
      - name: Normalize CodeQL Output
        if: always()
        run: |
          # CodeQL a veces genera nombres como 'java.sarif', lo renombramos para consistencia
          FILE=$(find security-results -name "*.sarif" | head -n 1)
          if [ -n "$FILE" ]; then
            cp "$FILE" security-results/codeql-results.sarif
            echo "✅ Archivo centralizado: security-results/codeql-results.sarif"
          else
            echo "❌ No se encontró el reporte de CodeQL"
          fi

      # 4. Conteo de hallazgos (Siguiendo tu lógica de JQ)
      - name: Count vulnerabilities (CodeQL)
        if: always()
        run: |
          FILE="security-results/codeql-results.sarif"
          if [ -f "$FILE" ]; then
            # En SARIF, el nivel 'error' equivale a Crítico/Alto
            TOTAL=$(jq '[.runs[].results[]?] | length' "$FILE")
            HIGH=$(jq '[.runs[].results[]? | select(.level=="error")] | length' "$FILE")
            MEDIUM=$(jq '[.runs[].results[]? | select(.level=="warning")] | length' "$FILE")
            LOW=$(jq '[.runs[].results[]? | select(.level=="note")] | length' "$FILE")

            echo "=== CodeQL Findings ==="
            echo "Total: $TOTAL"
            echo "High (Error): $HIGH"
            echo "Medium (Warning): $MEDIUM"
            echo "Low (Note): $LOW"
          fi

      # 5. Upload unificado para la IA
      - name: Upload CodeQL Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-codeql
          path: security-results/
          retention-days: 1