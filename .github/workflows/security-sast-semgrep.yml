name: "Security - SAST Semgrep"

on:
  workflow_call:

jobs:
  sast-semgrep:
    name: "2. SAST (Semgrep)"
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    continue-on-error: true

    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Prepare Results Directory
        run: |
          mkdir -p security-results
          echo "Workspace: $(pwd)"

      - name: Run Semgrep (JSON + SARIF)
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            returntocorp/semgrep semgrep scan \
            --config="p/default" \
            --config="p/security-audit" \
            --config="p/secrets" \
            --json \
            --sarif \
            --output=security-results/semgrep-results.json \
            --sarif-output=security-results/semgrep-results.sarif \
            . || true

          # Ajustar permisos UNA sola vez
          sudo chown -R $(id -u):$(id -g) security-results || true

      - name: Validate outputs
        run: |
          if [ ! -f security-results/semgrep-results.json ]; then
            echo "❌ No se encontró semgrep-results.json"
            exit 1
          fi

          if [ ! -f security-results/semgrep-results.sarif ]; then
            echo "❌ No se encontró semgrep-results.sarif"
            exit 1
          fi

      - name: Count vulnerabilities (Semgrep)
        run: |
          echo "📊 Conteo de vulnerabilidades Semgrep"

          CRITICAL=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' security-results/semgrep-results.json)
          HIGH=$(jq '[.results[] | select(.extra.severity=="WARNING")] | length' security-results/semgrep-results.json)
          LOW=$(jq '[.results[] | select(.extra.severity=="INFO")] | length' security-results/semgrep-results.json)

          TOTAL=$(jq '.results | length' security-results/semgrep-results.json)

          echo "Total: $TOTAL"
          echo "Critical (ERROR): $CRITICAL"
          echo "High (WARNING): $HIGH"
          echo "Low (INFO): $LOW"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-results/semgrep-results.sarif

      - name: Upload Semgrep Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-semgrep
          path: security-results/
          retention-days: 1