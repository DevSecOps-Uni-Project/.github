name: "Security - Container and DAST"

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        default: 'backend-ids'
      app-port:
        type: string
        default: '8080'

jobs:
  container-and-dast-security:
    name: "4. Contenedores y DAST"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Prepare Results Directory
        run: |
          mkdir -p security-results
          echo "Workspace: $(pwd)"

      - name: Build Local Image
        run: docker build -t ${{ inputs.image-name }}:test .

      - name: Start App Under Test
        run: |
          docker rm -f app-under-test >/dev/null 2>&1 || true
          docker run -d --name app-under-test -p ${{ inputs.app-port }}:${{ inputs.app-port }} ${{ inputs.image-name }}:test

      - name: Wait for App Startup
        run: |
          for i in $(seq 1 20); do
            if curl -sS "http://localhost:${{ inputs.app-port }}" >/dev/null 2>&1; then
              echo "Aplicacion disponible para DAST"
              exit 0
            fi
            echo "Esperando aplicacion... intento ${i}/20"
            sleep 3
          done
          echo "WARN: La aplicacion no respondio en el puerto esperado. ZAP se ejecutara igualmente."

      - name: Trivy Scan (JSON para IA)
        run: |
          # Generamos el JSON que el script de IA procesará
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $(pwd):/src \
            aquasec/trivy:0.49.1 image --format json --output /src/security-results/trivy-results.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW ${{ inputs.image-name }}:test
          
          # Corregir permisos del archivo generado por Docker
          sudo chown $(id -u):$(id -g) security-results/trivy-results.json || true
        continue-on-error: true

      - name: Trivy Scan (SARIF para GitHub Security)
        run: |
          # Generamos el SARIF para la pestaña 'Security' de GitHub
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $(pwd):/src \
            aquasec/trivy:0.49.1 image --format sarif --output /src/security-results/trivy-results.sarif \
            --severity CRITICAL,HIGH ${{ inputs.image-name }}:test
          
          sudo chown $(id -u):$(id -g) security-results/trivy-results.sarif || true
        continue-on-error: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/trivy-results.sarif
          category: trivy

      - name: ZAP Scan (Basado en API/Baseline)
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:${{ inputs.app-port }}'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          cmd_options: '-r security-results/zap-report.html -J security-results/zap-results.json'

      - name: Ensure DAST and Container JSON Output
        if: always()
        run: |
          if [ ! -f security-results/trivy-results.json ]; then
            echo '{"Results": []}' > security-results/trivy-results.json
            echo "WARN: Se genero fallback security-results/trivy-results.json"
          fi

          if [ ! -f security-results/zap-results.json ]; then
            echo '{"site": []}' > security-results/zap-results.json
            echo "WARN: Se genero fallback security-results/zap-results.json"
          fi

      - name: Stop App Under Test
        if: always()
        run: |
          docker rm -f app-under-test >/dev/null 2>&1 || true

      - name: Debug Trivy and ZAP Output
        if: always()
        run: |
          pwd
          ls -la
          ls -la security-results || true

      - name: Upload Security Artifacts (Combined)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-container-dast
          path: |
            security-results/trivy-results.json
            security-results/zap-results.json
            security-results/zap-report.html
          if-no-files-found: warn