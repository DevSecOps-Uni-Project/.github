name: "Security - Container and DAST"

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        default: 'backend-ids'
      app-port:
        type: string
        default: '8080'

jobs:
  container-and-dast-security:
    name: "4. Contenedores y DAST"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Build Local Image
        run: docker build -t ${{ inputs.image-name }}:test .

      - name: Trivy Scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $(pwd):/src \
            aquasec/trivy:0.49.1 image --format sarif --output /src/trivy-results.sarif \
            --severity CRITICAL,HIGH ${{ inputs.image-name }}:test
        continue-on-error: true

      - name: ZAP Scan (Basado en API/Baseline)
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:${{ inputs.app-port }}'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          cmd_options: '-r zap-report.html -J zap-results.json'

      - name: Upload Security Artifacts (Combined)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-and-container-reports
          path: |
            trivy-results.sarif
            zap-results.json
            zap-report.html
          if-no-files-found: warn