name: "Security - Container and DAST"

on:
  workflow_call:
    inputs:
      image-name:
        type: string
        default: 'backend-ids'
      app-port:
        type: string
        default: '8080'

jobs:
  container-and-dast-security:
    name: "4. Contenedores y DAST"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codigo
        uses: actions/checkout@v4

      - name: Build Local Image
        run: docker build -t ${{ inputs.image-name }}:test .

      - name: Trivy Scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $(pwd):/src \
            aquasec/trivy:0.49.1 image --format sarif --output /src/trivy-results.sarif \
            --severity CRITICAL,HIGH ${{ inputs.image-name }}:test

      - name: Levantar PostgreSQL efimero para DAST
        run: |
          set -e
          docker network create ids-net
          docker run -d --name pg-ids --network ids-net \
            -e POSTGRES_DB=idsdb \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:16

          for i in {1..24}; do
            if docker exec pg-ids pg_isready -U postgres -d idsdb >/dev/null 2>&1; then
              echo "PostgreSQL disponible para la app."
              exit 0
            fi
            sleep 5
          done

          echo "PostgreSQL no estuvo listo tras 120s."
          docker logs pg-ids || true
          exit 1

      - name: Levantar Aplicacion
        run: |
          docker run -d --name app-ids --network ids-net -p ${{ inputs.app-port }}:${{ inputs.app-port }} \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://pg-ids:5432/idsdb \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=postgres \
            -e AZURE_OPENAI_API_KEY=dast-placeholder-key \
            -e AZURE_OPENAI_ENDPOINT=https://example.openai.azure.com \
            -e AZURE_OPENAI_DEPLOYMENT=dast-placeholder-deployment \
            -e AZURE_OPENAI_DEPLOYMENT_NAME=dast-placeholder-deployment \
            -e AZURE_OPENAI_API_VERSION=2024-02-15-preview \
            -e GOOGLE_CLIENT_ID=dast-placeholder-client-id \
            -e GOOGLE_CLIENT_SECRET=dast-placeholder-client-secret \
            -e ML_ENDPOINT=https://example.com/predict \
            ${{ inputs.image-name }}:test

      - name: Esperar disponibilidad de la app
        run: |
          set -e
          APP_URL="http://localhost:${{ inputs.app-port }}"
          echo "Esperando que la app responda en ${APP_URL} ..."
          for i in {1..24}; do
            if curl -fsS "${APP_URL}" >/dev/null 2>&1 || curl -fsS "${APP_URL}/actuator/health" >/dev/null 2>&1; then
              echo "App disponible para ZAP en ${APP_URL}."
              exit 0
            fi
            sleep 5
          done

          echo "La app no estuvo disponible para ZAP tras 120s."
          docker ps -a
          docker logs app-ids || true
          docker logs pg-ids || true
          exit 1

      - name: Ajustar permisos para ZAP
        run: |
          sudo chmod -R a+rwX "$GITHUB_WORKSPACE"

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:${{ inputs.app-port }}'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          cmd_options: '-r zap_report.html'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap_report.html
            report_html.html
          if-no-files-found: warn

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
