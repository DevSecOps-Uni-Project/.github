name: "🛡️ Orquestador: Gobernanza DevSecOps Global"

on:
  workflow_call:
    secrets:
      SNYK_TOKEN:
        required: true
      SONAR_TOKEN:
        required: false

jobs:
  # PASO 1: Secretos (Si falla aquí, se detiene todo por seguridad)
  security-secrets:
    # REEMPLAZA 'tu-usuario/tu-repo-gobernanza' con tus datos reales
    uses: tu-usuario/tu-repo-gobernanza/.github/workflows/secrets-scan.yml@main

  # PASO 2: Librerías (Corre después de secretos)
  security-dependencies:
    needs: security-secrets
    uses: tu-usuario/tu-repo-gobernanza/.github/workflows/snyk-scan.yml@main
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # PASO 3: Infraestructura (Corre en paralelo con Snyk)
  security-infrastructure:
    needs: security-secrets
    uses: tu-usuario/tu-repo-gobernanza/.github/workflows/checkov-scan.yml@main

  # PASO 4: Calidad de Código (SonarCloud)
  # Lo mantenemos aquí directamente para evitar errores de ProjectKey por ahora
  security-quality:
    name: SonarCloud Analysis
    needs: [security-dependencies, security-infrastructure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Java 21 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Analyze with Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.0.0.4389:sonar \
          -Dsonar.host.url=https://sonarcloud.io