name: "Security - Final AI Audit"

on:
  workflow_call:
    secrets:
      CLAUDE_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Governance Tools
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github
          path: governance-tools

      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Debug Downloaded Artifacts
        run: |
          pwd
          ls -la
          echo "=== downloaded-artifacts tree ==="
          find downloaded-artifacts -maxdepth 5 -type f -print || true

      - name: Normalize Security Results
        run: |
          if [ -f scripts/normalize-security-results.sh ]; then
            NORMALIZER_SCRIPT="scripts/normalize-security-results.sh"
          elif [ -f governance-tools/scripts/normalize-security-results.sh ]; then
            NORMALIZER_SCRIPT="governance-tools/scripts/normalize-security-results.sh"
          else
            echo "ERROR: No se encontro normalize-security-results.sh en scripts/ ni en governance-tools/scripts/."
            exit 1
          fi

          echo "Using normalizer: ${NORMALIZER_SCRIPT}"
          chmod +x "${NORMALIZER_SCRIPT}"
          "${NORMALIZER_SCRIPT}" downloaded-artifacts security-results

      - name: Ensure Required JSON Files
        run: |
          ensure_json_file() {
            file="$1"
            content="$2"
            if [ ! -f "security-results/${file}" ]; then
              echo "WARN: Archivo requerido ausente -> security-results/${file}. Se crea fallback."
              printf '%s\n' "$content" > "security-results/${file}"
            fi
          }

          ensure_json_file "trufflehog-results.json" "[]"
          ensure_json_file "semgrep-results.json" '{"results": []}'
          ensure_json_file "snyk-results.json" '{"vulnerabilities": []}'
          ensure_json_file "trivy-results.json" '{"Results": []}'
          ensure_json_file "zap-results.json" '{"site": []}'

          echo "=== security-results final ==="
          ls -la security-results || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Engine
        run: pip install --no-cache-dir anthropic

      - name: Debug AI Configuration
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: |
          if [ -n "${CLAUDE_API_KEY:-}" ]; then
            echo "CLAUDE_API_KEY detectada (longitud: ${#CLAUDE_API_KEY})"
          else
            echo "CLAUDE_API_KEY ausente"
          fi

          if [ -n "${CLAUDE_MODEL:-}" ]; then
            echo "CLAUDE_MODEL configurado: ${CLAUDE_MODEL}"
          else
            echo "CLAUDE_MODEL no configurado. Se usara fallback del script."
          fi

      - name: Run IA Triage Mentor
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: |
          if [ -z "${CLAUDE_API_KEY:-}" ]; then
            echo "WARN: CLAUDE_API_KEY no esta configurada. Se omite la fase de IA y el pipeline continua."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "# 🤖 Reporte de Auditoría IA"
                echo "⚠️ IA omitida: CLAUDE_API_KEY no configurada."
              } >> "${GITHUB_STEP_SUMMARY}"
            fi
            exit 0
          fi

          if [ -f scripts/ia-triage.py ]; then
            TRIAGE_SCRIPT="scripts/ia-triage.py"
          elif [ -f governance-tools/scripts/ia-triage.py ]; then
            TRIAGE_SCRIPT="governance-tools/scripts/ia-triage.py"
          else
            echo "ERROR: No se encontro ia-triage.py en scripts/ ni en governance-tools/scripts/."
            exit 1
          fi

          echo "Using triage script: ${TRIAGE_SCRIPT}"
          set +e
          python "${TRIAGE_SCRIPT}" security-results
          TRIAGE_EXIT_CODE=$?
          set -e

          if [ "${TRIAGE_EXIT_CODE}" -eq 0 ]; then
            echo "AI triage completado: sin hallazgos prioritarios."
          elif [ "${TRIAGE_EXIT_CODE}" -eq 1 ]; then
            echo "AI triage completado: se detectaron hallazgos."
            echo "No se falla el job por hallazgos; la decision de bloqueo queda al pipeline principal."
          else
            echo "WARN: AI triage no pudo ejecutarse correctamente (exit ${TRIAGE_EXIT_CODE})."
            echo "Se continua el pipeline para no bloquear por un problema operativo de IA."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "# 🤖 Reporte de Auditoría IA"
                echo "⚠️ IA con error operativo (exit ${TRIAGE_EXIT_CODE}). Revisar token/API o disponibilidad del proveedor."
              } >> "${GITHUB_STEP_SUMMARY}"
            fi
            exit 0
          fi