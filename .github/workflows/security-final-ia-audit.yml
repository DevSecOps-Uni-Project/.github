name: "Security - Final AI Audit (Gemini)"

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor & Remediator"
    runs-on: ubuntu-latest
    permissions:
      contents: read       
      pull-requests: write 
      security-events: read
    steps:
      # 1. Descargamos el código del repo que lanzó el pipeline (Backend)
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      # 2. Descargamos el repo de GOBERNANZA (donde vive el script .py)
      - name: Checkout Governance Tools
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github # Tu repo central
          path: governance-tools # Lo ponemos en una carpeta aparte
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Descargamos los reportes de seguridad (SARIF/JSON)
      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y google-generativeai google-api-core || true
          pip install google-genai

      - name: Run IA Triage & Remediation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "❌ ERROR: GEMINI_API_KEY no configurada."
            exit 1
          fi

          # AJUSTE DE RUTA: Ahora buscamos dentro de la carpeta de gobernanza
          if [ -f governance-tools/scripts/gemini_auditor.py ]; then
            AUDITOR_SCRIPT="governance-tools/scripts/gemini_auditor.py"
          else
            echo "❌ ERROR: No se encontró el script en governance-tools/scripts/gemini_auditor.py"
            ls -R governance-tools # Debug para ver dónde quedó el archivo
            exit 1
          fi

          echo "🚀 Usando script centralizado de Gobernanza..."
          python "${AUDITOR_SCRIPT}"

      # 4. Publicación de resultados (Igual que antes)
      - name: Publish Report to Job Summary
        if: always()
        run: |
          if [ -f REPORTE_IA_SEGURIDAD.md ]; then
            cat REPORTE_IA_SEGURIDAD.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post AI Report to PR
        if: github.event_name == 'pull_request' && always()
        uses: mshick/add-pr-comment@v2
        with:
          message-path: REPORTE_IA_SEGURIDAD.md