name: "Security - Final AI Audit (Gemini)"

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor & Remediator"
    runs-on: ubuntu-latest
    permissions:
      contents: read       
      pull-requests: write 
      security-events: read
    steps:
      # 1. Descargamos el código del repo que lanzó el pipeline
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      # 2. Descargamos el repo de GOBERNANZA
      - name: Checkout Governance Tools
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github
          path: governance-tools
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Descargamos los reportes de seguridad
      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-results
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # CORRECCIÓN DE DEPENDENCIAS: Instalamos el nuevo SDK (google-genai)
      - name: Install AI Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y google-generativeai google-api-core || true
          pip install -U google-genai

      - name: Run IA Triage & Remediation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "❌ ERROR: GEMINI_API_KEY no configurada."
            exit 1
          fi

          # Validamos la ruta del script en la carpeta de gobernanza
          # Nota: Asegúrate de que el nombre del archivo en tu repo sea exactamente ia-triage.py
          if [ -f governance-tools/scripts/ia-triage.py ]; then
            AUDITOR_SCRIPT="governance-tools/scripts/ia-triage.py"
          elif [ -f governance-tools/scripts/gemini_auditor.py ]; then
            AUDITOR_SCRIPT="governance-tools/scripts/gemini_auditor.py"
          else
            echo "❌ ERROR: No se encontró el script de auditoría."
            ls -R governance-tools/scripts
            exit 1
          fi

          echo "🚀 Ejecutando auditoría con ${AUDITOR_SCRIPT}..."
          echo "📂 Archivos descargados para IA:"
          ls -la security-results || true
          python "${AUDITOR_SCRIPT}" security-results

      # 4. Publicación de resultados
      - name: Publish Report to Job Summary
        if: always()
        run: |
          if [ -f REPORTE_IA_SEGURIDAD.md ]; then
            cat REPORTE_IA_SEGURIDAD.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post AI Report to PR
        if: github.event_name == 'pull_request' && always()
        uses: mshick/add-pr-comment@v2
        with:
          message-path: REPORTE_IA_SEGURIDAD.md