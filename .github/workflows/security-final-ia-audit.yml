name: "Security - Final AI Audit"

on:
  workflow_call:
    secrets:
      CLAUDE_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Governance Tools
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github # Tu repo de gobernanza
          path: governance-tools

      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-results
          merge-multiple: true 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Engine
        run: pip install --no-cache-dir anthropic

      - name: Run IA Triage Mentor
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp governance-tools/scripts/ia-triage.py security-results/
          cd security-results
          python ia-triage.py