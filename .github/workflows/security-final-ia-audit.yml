name: "Security - Final AI Audit (Gemini)"

on:
  workflow_call:
    inputs:
      governance-tools-ref:
        type: string
        default: 'd8a9b820e593f7767b4456eb85554d1c3a28ca98'
      ia-fail-on-api-error:
        type: boolean
        default: false
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor & Remediator"
    runs-on: ubuntu-latest
    permissions:
      contents: read       
      pull-requests: write 
      security-events: read
    steps:
      # 1. Código del repo actual
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      # 2. Repo de GOBERNANZA (donde vive el script)
      - name: Checkout Governance Tools
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github
          ref: ${{ inputs.governance-tools-ref }}
          path: governance-tools
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Descarga de artefactos (SARIF, JSON, etc.)
      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-results
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optimiza ejecuciones futuras

      # 4. Instalación limpia del nuevo SDK
      - name: Install AI Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai

      # 5. Ejecución del Auditor
      - name: Run IA Triage & Remediation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-2.0-flash" # Forzamos el uso de 2.0 que es más potente
          IA_FAIL_ON_API_ERROR: ${{ inputs.ia-fail-on-api-error }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "❌ ERROR: GEMINI_API_KEY no configurada en los secrets."
            exit 1
          fi

          AUDITOR_SCRIPT="governance-tools/scripts/gemini_auditor.py"
          
          echo "🚀 Ejecutando auditoría con ${AUDITOR_SCRIPT}..."
          # Ejecutamos pasando el directorio de resultados como argumento
          python "${AUDITOR_SCRIPT}" security-results

      # 6. Publicación en el Job Summary (Vista de GitHub Actions)
      - name: Publish Report to Job Summary
        if: always()
        run: |
          if [ -f REPORTE_IA_SEGURIDAD.md ]; then
            echo "### 🤖 Informe de Seguridad IA" >> $GITHUB_STEP_SUMMARY
            cat REPORTE_IA_SEGURIDAD.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No se generó reporte de IA." >> $GITHUB_STEP_SUMMARY
          fi

      # 7. Comentario en el Pull Request (Si aplica)
      - name: Post AI Report to PR
        if: github.event_name == 'pull_request' && always()
        uses: mshick/add-pr-comment@v2
        with:
          message-path: REPORTE_IA_SEGURIDAD.md
          allow-repeated-comments: false