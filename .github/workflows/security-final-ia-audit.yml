name: "Security - Final AI Audit (Azure OpenAI)"

on:
  workflow_call:
    inputs:
      governance-tools-ref:
        type: string
        default: 'd8a9b820e593f7767b4456eb85554d1c3a28ca98'
      ia-fail-on-api-error:
        type: boolean
        default: false
    secrets:
      AZURE_OPENAI_PDF_ENDPOINT:
        required: true
      AZURE_OPENAI_PDF_API_KEY:
        required: true
      AZURE_OPENAI_PDF_DEPLOYMENT:
        required: true
      AZURE_OPENAI_PDF_API_VERSION:
        required: false

jobs:
  ai-triage:
    name: "8. Final AI Audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: read
      actions: write
    steps:
      # 1. Código del repo actual
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      # 2. Descarga del repo de gobernanza en el ref solicitado
      - name: Checkout Governance Tools
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/.github
          ref: ${{ inputs.governance-tools-ref }}
          path: governance-tools
          fetch-depth: 1

      # 3. Descarga de artefactos (SARIF, JSON, etc.)
      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-results
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Instalación de dependencias para OpenAI
      - name: Install AI Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U openai

      # 4.5 Verificar que existan los artefactos de seguridad
      - name: Verify Security Artifacts
        run: |
          echo "📂 Contenido de security-results:"
          if [ -d security-results ]; then
            ls -la security-results/ || echo "Directorio existe pero está vacío"
            find security-results -type f -exec ls -lh {} \;
          else
            echo "⚠️ Directorio security-results no existe"
            mkdir -p security-results
          fi

      # 5. Ejecución del Auditor con Azure OpenAI
      - name: Run Azure OpenAI Security Audit & Remediation
        env:
          AZURE_OPENAI_PDF_ENDPOINT: ${{ secrets.AZURE_OPENAI_PDF_ENDPOINT }}
          AZURE_OPENAI_PDF_API_KEY: ${{ secrets.AZURE_OPENAI_PDF_API_KEY }}
          AZURE_OPENAI_PDF_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_PDF_DEPLOYMENT }}
          AZURE_OPENAI_PDF_API_VERSION: ${{ secrets.AZURE_OPENAI_PDF_API_VERSION }}
          IA_FAIL_ON_API_ERROR: ${{ inputs.ia-fail-on-api-error }}
        run: |
          AUDITOR_SCRIPT="governance-tools/scripts/openai_auditor.py"
          if [ ! -f "${AUDITOR_SCRIPT}" ]; then
            AUDITOR_SCRIPT=".github/scripts/openai_auditor.py"
          fi

          if [ ! -f "${AUDITOR_SCRIPT}" ]; then
            AUDITOR_SCRIPT="scripts/openai_auditor.py"
          fi

          if [ ! -f "${AUDITOR_SCRIPT}" ]; then
            echo "❌ No se encontró openai_auditor.py en governance-tools/scripts, .github/scripts ni scripts/"
            exit 1
          fi

          echo "🚀 Ejecutando auditoría con Azure OpenAI..."
          echo "📂 Usando script: ${AUDITOR_SCRIPT}"
          echo "📊 Directorio actual: $(pwd)"
          python "${AUDITOR_SCRIPT}" security-results || {
            echo "❌ El script de auditoría falló con código $?"
            exit 1
          }

      # 5.5 Verificar que se generó el reporte
      - name: Verify Report Generation
        if: always()
        run: |
          echo "📋 Verificando reportes generados..."
          if [ -f REPORTE_IA_SEGURIDAD.md ]; then
            echo "✅ REPORTE_IA_SEGURIDAD.md existe"
            echo "📏 Tamaño: $(wc -c < REPORTE_IA_SEGURIDAD.md) bytes"
          else
            echo "❌ REPORTE_IA_SEGURIDAD.md NO EXISTE"
          fi

          if [ -f VULNERABILITIES.json ]; then
            echo "✅ VULNERABILITIES.json existe"
            echo "📏 Tamaño: $(wc -c < VULNERABILITIES.json) bytes"
          else
            echo "❌ VULNERABILITIES.json NO EXISTE"
          fi

          echo "📂 Archivos en directorio actual:"
          ls -la | grep -E "REPORTE|VULNERABILITIES" || echo "No hay reportes generados"

      # 6. Upload de Reporte Estructurado (JSON)
      - name: Upload Vulnerability Report (JSON)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-vulnerabilities-report
          path: VULNERABILITIES.json
          if-no-files-found: warn
          retention-days: 30

      # 7. Publicación en el Job Summary (Vista de GitHub Actions)
      - name: Publish Report to Job Summary
        if: always()
        run: |
          if [ -f REPORTE_IA_SEGURIDAD.md ]; then
            echo "### 🤖 Informe de Seguridad IA (OpenAI GPT-4o)" >> $GITHUB_STEP_SUMMARY
            cat REPORTE_IA_SEGURIDAD.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No se generó reporte de IA." >> $GITHUB_STEP_SUMMARY
          fi

      # 8. Comentario en el Pull Request (Si aplica y reporte existe)
      - name: Post AI Report to PR
        if: |
          github.event_name == 'pull_request' &&
          always() &&
          hashFiles('REPORTE_IA_SEGURIDAD.md') != ''
        uses: mshick/add-pr-comment@v2
        with:
          message-path: REPORTE_IA_SEGURIDAD.md
          allow-repeats: false

      # 9. Si no se pudo generar el reporte, postear error
      - name: Post Error Message to PR
        if: |
          github.event_name == 'pull_request' &&
          always() &&
          hashFiles('REPORTE_IA_SEGURIDAD.md') == ''
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ❌ **Error en Auditoría IA**

            No se pudo generar el reporte de IA. Detalles:
            - El script de auditoría no generó REPORTE_IA_SEGURIDAD.md
            - Verifica los logs del workflow para más información
            - Asegúrate de que existen artefactos de seguridad para analizar
          allow-repeats: false

      # 9. Trigger remediation proposal if possible
      - name: Trigger Remediation Proposal Workflow
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const sourceRunId = '${{ github.run_id }}';
            const pr = context.payload.pull_request;

            if (!pr) {
              console.log('No hay contexto de pull_request disponible');
              return;
            }

            if (!fs.existsSync('VULNERABILITIES.json')) {
              console.log('No se encontró VULNERABILITIES.json');
              return;
            }

            const report = JSON.parse(fs.readFileSync('VULNERABILITIES.json', 'utf8'));

            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              console.log('Se omite la propuesta de remediación para PRs desde forks');
              return;
            }

            if (report.can_auto_fix && report.vulnerabilidades.length > 0) {
              console.log(`✅ Disparando propuesta de remediación para ${report.vulnerabilidades.length} vulnerabilidades`);

              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'auto-remediate.yml',
                ref: pr.head.ref,
                inputs: {
                  'source-pr': pr.number.toString(),
                  'source-run-id': sourceRunId,
                  'report-artifact-name': 'security-vulnerabilities-report'
                }
              });
            } else {
              console.log('No se generará propuesta automática para estos hallazgos');
            }
