name: "Security - Final AI Audit"

on:
  workflow_call:
    secrets:
      CLAUDE_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Debug Downloaded Artifacts
        run: |
          pwd
          ls -la
          echo "=== downloaded-artifacts tree ==="
          find downloaded-artifacts -maxdepth 5 -type f -print || true

      - name: Normalize Security Results
        run: |
          chmod +x scripts/normalize-security-results.sh
          scripts/normalize-security-results.sh downloaded-artifacts security-results

      - name: Ensure Required JSON Files
        run: |
          ensure_json_file() {
            file="$1"
            content="$2"
            if [ ! -f "security-results/${file}" ]; then
              echo "WARN: Archivo requerido ausente -> security-results/${file}. Se crea fallback."
              printf '%s\n' "$content" > "security-results/${file}"
            fi
          }

          ensure_json_file "trufflehog-results.json" "[]"
          ensure_json_file "semgrep-results.json" '{"results": []}'
          ensure_json_file "snyk-results.json" '{"vulnerabilities": []}'
          ensure_json_file "trivy-results.json" '{"Results": []}'
          ensure_json_file "zap-results.json" '{"site": []}'

          echo "=== security-results final ==="
          ls -la security-results || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Engine
        run: pip install --no-cache-dir anthropic

      - name: Run IA Triage Mentor
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ia-triage.py security-results