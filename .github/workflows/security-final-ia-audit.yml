name: "Security - Final AI Audit (Gemini)"

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-triage:
    name: "AI Security Mentor & Remediator"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Descargamos todos los artefactos de las fases anteriores
      - name: Download All Security Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AI Engine Dependencies
        run: |
          pip install --no-cache-dir google-generativeai

      - name: Run IA Triage & Remediation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Verificación de la API Key
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "❌ ERROR: GEMINI_API_KEY no configurada. La auditoría IA es obligatoria."
            exit 1
          fi

          # 2. Localizar el script en la ruta corregida (scripts/ en lugar de .github/scripts/)
          if [ -f scripts/gemini_auditor.py ]; then
            AUDITOR_SCRIPT="scripts/gemini_auditor.py"
          elif [ -f .github/scripts/gemini_auditor.py ]; then
            AUDITOR_SCRIPT=".github/scripts/gemini_auditor.py"
          else
            echo "❌ ERROR: No se encontró gemini_auditor.py en scripts/ ni en .github/scripts/"
            # Listamos el directorio para debuggear en el log si vuelve a fallar
            ls -R
            exit 1
          fi

          echo "🚀 Usando script en: ${AUDITOR_SCRIPT}"
          echo "🚀 Iniciando Auditoría con Gemini 1.5 Flash..."
          
          # 3. Ejecución del motor de IA
          python "${AUDITOR_SCRIPT}"

      # Publicamos el reporte en el resumen del Job de GitHub (Summary)
      - name: Publish Report to Job Summary
        if: always()
        run: |
          if [ -f REPORTE_IA_SEGURIDAD.md ]; then
            cat REPORTE_IA_SEGURIDAD.md >> $GITHUB_STEP_SUMMARY
          else
            echo "# 🤖 Reporte de Auditoría IA" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ No se pudo generar el archivo de reporte." >> $GITHUB_STEP_SUMMARY
          fi

      # Si es un Pull Request, ponemos la remediación como comentario
      - name: Post AI Report to PR
        if: github.event_name == 'pull_request' && always()
        uses: mshick/add-pr-comment@v2
        with:
          message-path: REPORTE_IA_SEGURIDAD.md

      # Guardamos el reporte como un artefacto descargable
      - name: Upload Final AI Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI-Remediation-Report
          path: REPORTE_IA_SEGURIDAD.md
          retention-days: 5