name: "DevSecOps Governance Pipeline"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  secrets-scan:
    name: "Escaneo de Secretos (TruffleHog)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Ejecutar TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  dependency-scan:
    name: "SCA con Snyk e IA"
    needs: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Snyk SCA
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --json-file-output=snyk-results.json
        continue-on-error: true

      - name: IA Triage Analysis
        shell: python
        run: |
          import json
          import os
          
          def triage():
              file_path = 'snyk-results.json'
              if not os.path.exists(file_path):
                  print("❌ No se encontró el reporte de Snyk.")
                  return
              
              with open(file_path, 'r') as f:
                  data = json.load(f)
              
              vulnerabilities = data.get('vulnerabilities', [])
              high_risks = [v for v in vulnerabilities if v['severity'] in ['critical', 'high']]
              
              print("--- IA TRIAGE REPORT (Awesome-DevSecOps Standard) ---")
              if not high_risks:
                  print("✅ Proyecto Seguro: Cumple con los estándares de la organización.")
              else:
                  print(f"⚠️ Se detectaron {len(high_risks)} vulnerabilidades de alto impacto.")
                  for v in high_risks:
                      print(f"- [{v['severity'].upper()}] {v['title']} en {v['packageName']}")
                  print("\n💡 Sugerencia de IA: Actualice las versiones en el pom.xml según las recomendaciones de Snyk.")

          triage()