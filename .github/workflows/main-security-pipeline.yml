name: "DevSecOps Governance: Main Security Orchestrator"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-name:
        type: string
        default: 'backend-ids'
      app-port:
        type: string
        default: '8080'
    secrets:
      SNYK_TOKEN:
        required: false
      CLAUDE_API_KEY: 
        required: true
  workflow_dispatch:

jobs:
  secrets-audit:
    name: "Orquestacion - Secretos"
    uses: ./.github/workflows/security-secrets-audit.yml

  sast-semgrep:
    name: "Orquestacion - SAST"
    needs: secrets-audit
    uses: ./.github/workflows/security-sast-semgrep.yml

  sast-codeql:
    name: "Orquestacion - CodeQL"
    needs: secrets-audit
    uses: ./.github/workflows/security-sast-codeql.yml

  dependency-scan:
    name: "Orquestacion - SCA"
    needs: secrets-audit
    uses: ./.github/workflows/security-sca-snyk.yml
    with:
      java-version: ${{ inputs.java-version || '21' }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}


  final-audit:
    needs: [secrets-audit, dependency-scan, sast-semgrep] 
    if: always() 
    uses: ./.github/workflows/security-final-ia-audit.yml 
    secrets:
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}