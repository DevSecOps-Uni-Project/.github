name: "DevSecOps Governance: Multi-Stage Security"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-name:
        type: string
        default: 'backend-ids'
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  # 1. ESCANEO DE SECRETOS (TruffleHog)
  # Detiene todo si hay llaves expuestas en el historial de Git.
  secrets-audit:
    name: "1. Guardián de Secretos"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # 2. ANÁLISIS DE DEPENDENCIAS (Snyk SCA)
  # Escanea el pom.xml o build.gradle en busca de librerías vulnerables.
  dependency-scan:
    name: "2. SCA (Snyk)"
    needs: secrets-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Snyk SCA
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --json-file-output=snyk-results.json
        continue-on-error: true

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-results.json

  # 3. ESCANEO DE CONTENEDORES (Trivy)
  # Revisa el Dockerfile y las vulnerabilidades del Sistema Operativo de la imagen.
  container-security:
    name: "3. Seguridad de Contenedores"
    needs: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Build Local Image
        run: docker build -t ${{ inputs.image-name }}:test .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ inputs.image-name }}:test'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.json
  
  sast-semgrep:
    name: "2. SAST (Semgrep)"
    needs: secrets-audit
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep # Imagen oficial de Semgrep
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Semgrep Scan (Java & Spring)
        run: |
          semgrep scan \
            --config="p/java" \
            --config="p/spring" \
            --json \
            --output=semgrep-results.json \
            --error # Hace que el pipeline falle si encuentra hallazgos graves
        
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always() # Siempre sube el reporte, incluso si falla
        with:
          name: semgrep-report
          path: semgrep-results.json

  # 4. AUDITORÍA FINAL DE IA (IA Triage)
  # Este job unifica los reportes y decide el éxito basado en Awesome-DevSecOps.
  final-ia-audit:
    name: "4. Auditoría de IA y Decisiones"
    needs: [dependency-scan, container-security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gobernanza (Scripts)
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github
          path: governance-tools

      - name: Download All Reports
        uses: actions/download-artifact@v4

      - name: Run IA Triage Unified
        shell: python
        run: |
          # Movemos los archivos al nivel raíz para el script
          import os, shutil
          paths = ['snyk-report/snyk-results.json', 'trivy-report/trivy-results.json']
          for p in paths:
              if os.path.exists(p): shutil.move(p, os.path.basename(p))
          
          # Ejecutamos el script de inteligencia
          os.system('python governance-tools/scripts/ia-triage.py')