name: "DevSecOps Governance: Multi-Stage Security"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-name:
        type: string
        default: 'backend-ids'
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  # 1. ESCANEO DE SECRETOS
  secrets-audit:
    name: "1. Guardián de Secretos"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # 2. SAST (SEMGREP)
  sast-semgrep:
    name: "2. SAST (Semgrep)"
    needs: secrets-audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    continue-on-error: true 
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      - name: Semgrep Scan
        run: |
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan \
            --config="p/default" --config="p/security-audit" --config="p/secrets" \
            --exclude="mvnw*" --exclude=".mvn/" --sarif --output=semgrep-results.sarif || [ $? -eq 7 ]
      - name: Upload Semgrep to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'semgrep-results.sarif'
          category: 'semgrep-sast'
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.sarif

  # 3. SCA (SNYK)
  dependency-scan:
    name: "3. SCA (Snyk)"
    needs: secrets-audit
    runs-on: ubuntu-latest
    continue-on-error: true 
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4 
      - name: Setup Java
        uses: actions/setup-java@v4 
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - name: Run Snyk
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --file=pom.xml --json > snyk-results.json || true
      - name: Upload Report
        uses: actions/upload-artifact@v4 
        with:
          name: snyk-report
          path: snyk-results.json

  # 3.5 GENERACIÓN DE SBOM (CycloneDX)
  sbom-generation:
    name: "3.5 Inventario SBOM"
    needs: secrets-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Generar SBOM con Maven
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -Dcyclonedx.skipAttach=true
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-sbom
          path: target/bom.json

  # 4. SEGURIDAD DE CONTENEDORES
  container-security:
    name: "4. Seguridad de Contenedores"
    needs: [sast-semgrep, dependency-scan]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Build Local Image
        run: docker build -t ${{ inputs.image-name }}:test .

      - name: Trivy Scan (Fuerza SARIF vía Docker)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/src \
            aquasec/trivy:0.49.1 image \
            --format sarif \
            --output /src/trivy-results.sarif \
            --severity CRITICAL,HIGH \
            ${{ inputs.image-name }}:test

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

      - name: Upload Report for IA
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  # 5. AUDITORÍA FINAL DE IA (IA TRIAGE)
  final-ia-audit:
    name: "5. Auditoría de IA y Decisiones"
    # IMPORTANTE: Ahora también necesita 'sbom-generation'
    needs: [sast-semgrep, dependency-scan, container-security, sbom-generation] 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código del Proyecto
        uses: actions/checkout@v4
        with:
          path: project-source
      - name: Checkout Gobernanza
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github
          path: governance-tools
      - name: Descargar Reportes
        uses: actions/download-artifact@v4

      - name: Consolidar y Ejecutar IA
        shell: python
        run: |
          import os, shutil
          
          report_map = {
              'snyk-report/snyk-results.json': 'snyk-results.json',
              'trivy-report/trivy-results.sarif': 'trivy-results.sarif', 
              'semgrep-report/semgrep-results.sarif': 'semgrep-results.sarif', 
              'project-sbom/bom.json': 'project-sbom.json'  # <-- Mapeo del SBOM
          }
          
          print("--- 📦 Consolidando reportes de seguridad ---")
          for src, dest in report_map.items():
              if os.path.exists(src):
                  shutil.copy(src, dest)
                  print(f"✅ Reporte {dest} listo.")
              else:
                  print(f"⚠️ Aviso: No se encontró {src}.")
          
          print("\n--- 🤖 Ejecutando Triage de IA ---")
          result = os.system('python governance-tools/scripts/ia-triage.py')
          if result != 0:
              exit(1)