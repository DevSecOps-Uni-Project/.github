name: "DevSecOps Governance: Main Security Orchestrator"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-name:
        type: string
        default: 'backend-ids'
      app-port:
        type: string
        default: '8080'
      governance-tools-ref:
        type: string
        default: 'd8a9b820e593f7767b4456eb85554d1c3a28ca98'
      ia-fail-on-api-error:
        type: boolean
        default: false
    secrets:
      SNYK_TOKEN:
        required: true
      OPENAI_API_KEY:
        required: true
      DTRACK_API_KEY:
        required: false
  workflow_dispatch:

# Permisos globales para que CodeQL y las herramientas SARIF funcionen
permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  # FASE 1: SECRETOS (BLOQUEANTE INICIAL)
  secrets-audit:
    name: "Orquestacion - Secretos"
    uses: ./.github/workflows/security-secrets-audit.yml

  # FASE 2: ANÁLISIS ESTÁTICO Y DEPENDENCIAS (EN PARALELO)
  sast-semgrep:
    name: "Orquestacion - SAST Semgrep"
    needs: secrets-audit
    uses: ./.github/workflows/security-sast-semgrep.yml

  sast-codeql:
    name: "Orquestacion - SAST CodeQL"
    needs: secrets-audit
    # Permisos heredados explícitamente para evitar el error de 'packages: none'
    permissions:
      contents: read
      security-events: write
      packages: read
      actions: read
    uses: ./.github/workflows/security-sast-codeql.yml

  dependency-scan:
    name: "Orquestacion - SCA Snyk"
    needs: secrets-audit
    uses: ./.github/workflows/security-sca-snyk.yml
    with:
      java-version: ${{ inputs.java-version }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sbom-inventory:
    name: "Orquestacion - SBOM"
    needs: secrets-audit
    uses: ./.github/workflows/security-sbom.yml
    with:
      java-version: ${{ inputs.java-version }}

  dependabot-scan:
    name: "Orquestacion - Dependabot"
    needs: secrets-audit
    uses: ./.github/workflows/security-dependabot.yml

  # FASE 3: ANÁLISIS DINÁMICO (DAST) Y CONTENEDORES
  # Se ejecuta después de que el análisis estático no encuentre bloqueos críticos inmediatos
  container-and-dast:
    name: "Orquestacion - Contenedores y DAST"
    needs: [sast-semgrep, dependency-scan]
    uses: ./.github/workflows/security-container-dast.yml
    with:
      image-name: ${{ inputs.image-name }}
      app-port: ${{ inputs.app-port }}

  # FASE 4: AUDITORÍA FINAL CON IA (EL CIERRE)
  final-audit:
    name: "Orquestacion - Mentor de IA"
    # IMPORTANTE: Espera a TODOS los jobs para recolectar todos los archivos JSON/SARIF
    needs: [
      secrets-audit,
      sast-semgrep,
      sast-codeql,
      dependency-scan,
      dependabot-scan,
      sbom-inventory,
      container-and-dast
    ]
    if: always()
    permissions:
      contents: read
      pull-requests: write
      security-events: read
      actions: read
    uses: ./.github/workflows/security-final-ia-audit.yml
    with:
      governance-tools-ref: ${{ inputs.governance-tools-ref }}
      ia-fail-on-api-error: ${{ inputs.ia-fail-on-api-error }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
