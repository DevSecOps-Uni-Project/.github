name: "DevSecOps Governance: Multi-Stage Security"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-name:
        type: string
        default: 'backend-ids'
    secrets:
      SNYK_TOKEN:
        required: true

jobs:
  # 1. ESCANEO DE SECRETOS
  secrets-audit:
    name: "1. Guardián de Secretos"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # 2. SAST (SEMGREP) - Análisis de Lógica Java
  sast-semgrep:
    name: "2. SAST (Semgrep)"
    needs: secrets-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      - name: Semgrep Scan (Docker version para evitar fallos de permisos)
        run: |
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan \
            --config="p/java" \
            --config="p/spring" \
            --json \
            --output=semgrep-results.json
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json

  # 3. SCA (SNYK) - Análisis de pom.xml
  dependency-scan:
    name: "3. SCA (Snyk)"
    needs: secrets-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Snyk SCA
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --json-file-output=snyk-results.json
        continue-on-error: true
      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-results.json

  # 4. SEGURIDAD DE CONTENEDORES (TRIVY)
  container-security:
    name: "4. Seguridad de Contenedores"
    needs: [sast-semgrep, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
      - name: Build Local Image
        run: docker build -t ${{ inputs.image-name }}:test .
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ inputs.image-name }}:test'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.json

  # 5. AUDITORÍA FINAL DE IA (IA TRIAGE)
  final-ia-audit:
    name: "5. Auditoría de IA y Decisiones"
    needs: [container-security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gobernanza (Scripts)
        uses: actions/checkout@v4
        with:
          repository: DevSecOps-Uni-Project/.github
          path: governance-tools
      - name: Descargar Reportes (Artifacts)
        uses: actions/download-artifact@v4
      - name: Consolidar y Ejecutar IA
        shell: python
        run: |
          import os, shutil
          # Rutas de los reportes descargados por GitHub Actions
          report_map = {
              'snyk-report/snyk-results.json': 'snyk-results.json',
              'trivy-report/trivy-results.json': 'trivy-results.json',
              'semgrep-report/semgrep-results.json': 'semgrep-results.json'
          }
          for src, dest in report_map.items():
              if os.path.exists(src):
                  shutil.move(src, dest)
                  print(f"✅ Reporte {dest} listo.")
              else:
                  print(f"⚠️ No se encontró {src}")
          
          os.system('python governance-tools/scripts/ia-triage.py')