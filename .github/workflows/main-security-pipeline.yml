name: "DevSecOps Governance: Main Security Orchestrator"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: '21'
      image-name:
        type: string
        default: 'backend-ids'
      app-port:
        type: string
        default: '8080'
    secrets:
      SNYK_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      java-version:
        description: "Version de Java para SCA/SBOM"
        required: false
        default: "21"
      image-name:
        description: "Nombre de imagen para escaneo de contenedor"
        required: false
        default: "backend-ids"
      app-port:
        description: "Puerto de la aplicacion para DAST"
        required: false
        default: "8080"

jobs:
  secrets-audit:
    name: "Orquestacion - Secretos"
    uses: ./.github/workflows/security-secrets-audit.yml

  sast-semgrep:
    name: "Orquestacion - SAST"
    needs: secrets-audit
    uses: ./.github/workflows/security-sast-semgrep.yml

  dependency-scan:
    name: "Orquestacion - SCA"
    needs: secrets-audit
    uses: ./.github/workflows/security-sca-snyk.yml
    with:
      java-version: ${{ inputs.java-version || github.event.inputs.java-version || '21' }}
    secrets: inherit

  sbom-generation:
    name: "Orquestacion - SBOM"
    needs: secrets-audit
    uses: ./.github/workflows/security-sbom.yml
    with:
      java-version: ${{ inputs.java-version || github.event.inputs.java-version || '21' }}

  container-and-dast-security:
    name: "Orquestacion - Contenedores y DAST"
    needs: [sast-semgrep, dependency-scan]
    uses: ./.github/workflows/security-container-dast.yml
    with:
      image-name: ${{ inputs.image-name || github.event.inputs.image-name || 'backend-ids' }}
      app-port: ${{ inputs.app-port || github.event.inputs.app-port || '8080' }}

  final-ia-audit:
    name: "Orquestacion - Gate Final"
    needs: [sast-semgrep, dependency-scan, container-and-dast-security, sbom-generation]
    uses: ./.github/workflows/security-final-ia-audit.yml
    secrets: inherit
